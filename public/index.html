<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cipher — Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --surface3: #24242f;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --accent: #6366f1;
  --accent-dim: rgba(99,102,241,0.15);
  --accent-hover: #818cf8;
  --text: #ededf5;
  --text-2: #9191a4;
  --text-3: #5a5a6e;
  --danger: #ef4444;
  --success: #10b981;
  --radius: 14px;
  --radius-sm: 8px;
  --sidebar: 300px;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Figtree', sans-serif; font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

/* ─── Auth Screen ─── */
#auth-screen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%);
  z-index: 100;
}

.auth-box {
  width: 100%; max-width: 400px; padding: 0 24px;
}

.auth-logo {
  font-size: 28px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px;
  background: linear-gradient(135deg, #fff 0%, #9b9bdb 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.auth-logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }

.auth-sub { color: var(--text-2); font-size: 14px; margin-bottom: 40px; }

.auth-tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--border2); }
.auth-tab {
  flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 500;
  color: var(--text-2); border-bottom: 2px solid transparent; transition: all .2s; margin-bottom: -1px;
}
.auth-tab.active { color: var(--text); border-color: var(--accent); }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
.field input {
  width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 15px;
  outline: none; transition: border-color .2s;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-3); }

.btn {
  width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: var(--radius-sm);
  color: #fff; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all .2s; margin-top: 6px; letter-spacing: .01em;
}
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn.secondary { background: var(--surface3); color: var(--text); }
.btn.secondary:hover { background: var(--surface2); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.error-msg { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; }

/* ─── App Layout ─── */
#app { display: flex; height: 100vh; display: none; }

/* ─── Sidebar ─── */
.sidebar {
  width: var(--sidebar); min-width: var(--sidebar);
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

.sidebar-header {
  padding: 18px 16px 14px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.logo span { color: var(--accent); }

.header-actions { display: flex; gap: 4px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px; border: none;
  background: transparent; color: var(--text-2); cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0;
}
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.icon-btn svg { width: 18px; height: 18px; }

.search-wrap { padding: 12px 12px 0; }
.search-input {
  width: 100%; padding: 9px 12px 9px 36px; background: var(--surface2);
  border: 1px solid transparent; border-radius: var(--radius-sm); color: var(--text);
  font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s;
  position: relative;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-3); }
.search-wrap-inner { position: relative; }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); pointer-events: none;
}
.search-icon svg { width: 16px; height: 16px; }

.search-results {
  position: absolute; left: 12px; right: 12px; top: calc(100% + 4px);
  background: var(--surface3); border: 1px solid var(--border2); border-radius: var(--radius-sm);
  overflow: hidden; z-index: 10; display: none;
}
.search-results.show { display: block; }
.search-result-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; transition: background .15s;
}
.search-result-item:hover { background: var(--surface2); }

.chat-list { flex: 1; overflow-y: auto; padding: 8px 8px 0; }
.chat-list::-webkit-scrollbar { width: 4px; }
.chat-list::-webkit-scrollbar-track { background: transparent; }
.chat-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.chat-item {
  display: flex; align-items: center; gap: 11px; padding: 10px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background .15s; position: relative;
}
.chat-item:hover { background: var(--surface2); }
.chat-item.active { background: var(--accent-dim); }

.avatar {
  width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-weight: 600; font-size: 16px; color: #fff; flex-shrink: 0;
  text-transform: uppercase;
}
.avatar.sm { width: 32px; height: 32px; font-size: 12px; }
.avatar.group { font-size: 18px; }

.chat-info { flex: 1; min-width: 0; }
.chat-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-preview { font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.chat-time { font-size: 11px; color: var(--text-3); flex-shrink: 0; }

.sidebar-bottom {
  border-top: 1px solid var(--border); padding: 12px 14px; display: flex; align-items: center; gap: 10px;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-status { font-size: 12px; color: var(--success); }

/* ─── Main Chat ─── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }

.chat-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
  background: var(--surface); flex-shrink: 0;
}
.chat-header-info { flex: 1; min-width: 0; }
.chat-header-name { font-size: 16px; font-weight: 600; }
.chat-header-sub { font-size: 12px; color: var(--text-2); margin-top: 1px; }

/* Empty state */
.empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-3); gap: 12px;
}
.empty-state svg { width: 48px; height: 48px; opacity: .3; }
.empty-state p { font-size: 15px; }

/* Messages */
.messages-wrap { flex: 1; overflow-y: auto; padding: 20px 20px 8px; display: flex; flex-direction: column; gap: 2px; }
.messages-wrap::-webkit-scrollbar { width: 4px; }
.messages-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.msg-group { margin-bottom: 14px; }
.msg-sender-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.msg-sender-name { font-size: 12px; font-weight: 600; }
.msg-sender-time { font-size: 11px; color: var(--text-3); }

.msg-bubble-wrap { display: flex; flex-direction: column; gap: 3px; }
.msg-bubble {
  display: inline-block; max-width: 480px; padding: 9px 14px;
  border-radius: 18px; font-size: 14px; line-height: 1.55; word-break: break-word;
}

.msg-group.mine { align-items: flex-end; }
.msg-group.mine .msg-bubble-wrap { align-items: flex-end; }
.msg-group.mine .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 6px; }
.msg-group.mine .msg-sender-row { flex-direction: row-reverse; }

.msg-group.other .msg-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 6px; }
.msg-group.other .msg-bubble-wrap { align-items: flex-start; }

.msg-time { font-size: 10px; color: var(--text-3); padding: 0 4px; }

/* Typing indicator */
.typing-indicator { font-size: 12px; color: var(--text-2); padding: 4px 20px; min-height: 24px; flex-shrink: 0; }

/* Input area */
.input-area {
  padding: 12px 16px 16px; border-top: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0;
}
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.msg-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 12px 16px; color: var(--text); font-family: inherit; font-size: 14px; outline: none;
  resize: none; max-height: 140px; line-height: 1.5; transition: border-color .2s; min-height: 44px;
}
.msg-input:focus { border-color: var(--accent); }
.msg-input::placeholder { color: var(--text-3); }

.send-btn {
  width: 44px; height: 44px; border-radius: 12px; border: none; background: var(--accent);
  color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.send-btn svg { width: 18px; height: 18px; }

/* ─── Modal ─── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 50; display: none;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 28px; width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto;
  animation: modal-in .2s ease;
}
@keyframes modal-in { from { opacity: 0; transform: scale(.95) translateY(8px); } to { opacity: 1; transform: none; } }
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

.user-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chip {
  display: flex; align-items: center; gap: 6px; padding: 5px 10px 5px 6px;
  background: var(--accent-dim); border: 1px solid rgba(99,102,241,.3); border-radius: 20px;
  font-size: 13px; color: var(--accent-hover);
}
.chip-remove { cursor: pointer; color: var(--text-2); line-height: 1; font-size: 16px; }
.chip-remove:hover { color: var(--danger); }

.member-list { margin-top: 8px; max-height: 180px; overflow-y: auto; }
.member-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; border-radius: 6px; transition: background .15s;
}
.member-item:hover { background: var(--surface2); padding: 8px 8px; margin: 0 -8px; }

.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions .btn { flex: 1; }

/* ─── Date divider ─── */
.date-divider { text-align: center; margin: 12px 0 8px; }
.date-divider span { font-size: 11px; color: var(--text-3); background: var(--surface2); padding: 3px 10px; border-radius: 20px; }

/* Logout btn */
.logout-btn {
  width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent;
  color: var(--text-3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.logout-btn:hover { background: var(--surface2); color: var(--danger); }

/* Scrollbar for modal */
.modal::-webkit-scrollbar, .member-list::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-thumb, .member-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.no-chats { text-align: center; padding: 40px 20px; color: var(--text-3); font-size: 13px; }
</style>
</head>
<body>

<!-- ── Auth Screen ─────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">cipher<span>.</span></div>
    <p class="auth-sub">Private, encrypted messaging</p>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Sign in</div>
      <div class="auth-tab" onclick="switchTab('register')">Create account</div>
    </div>

    <div id="login-form">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn" onclick="doLogin()">Sign in</button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <div id="register-form" style="display:none">
      <div class="field">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="your_username" autocomplete="username" oninput="checkUsername(this.value)">
        <div id="username-hint" style="font-size:12px;margin-top:5px;min-height:16px"></div>
      </div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="reg-password" placeholder="min. 6 characters" autocomplete="new-password"></div>
      <button class="btn" onclick="doRegister()">Create account</button>
      <div class="error-msg" id="register-error"></div>
    </div>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────────────── -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">cipher<span>.</span></div>
      <div class="header-actions">
        <button class="icon-btn" onclick="showDMModal()" title="New message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="icon-btn" onclick="showGroupModal()" title="New group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
      </div>
    </div>

    <div class="search-wrap" style="position:relative">
      <div class="search-wrap-inner">
        <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input class="search-input" id="user-search" placeholder="Search users..." oninput="searchUsers(this.value)" onfocus="this.nextElementSibling.classList.add('show')" onblur="setTimeout(()=>document.getElementById('search-results').classList.remove('show'),200)">
        <div class="search-results" id="search-results"></div>
      </div>
    </div>

    <div class="chat-list" id="chat-list">
      <div class="no-chats">No conversations yet.<br>Search for a user to start chatting.</div>
    </div>

    <div class="sidebar-bottom">
      <div class="avatar sm" id="my-avatar"></div>
      <div class="user-info">
        <div class="user-name" id="my-username"></div>
        <div class="user-status">● Online</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Select a conversation</p>
    </div>

    <div id="chat-view" style="display:none; flex-direction:column; height:100%">
      <div class="chat-header">
        <div class="avatar" id="chat-avatar"></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-header-name"></div>
          <div class="chat-header-sub" id="chat-header-sub"></div>
        </div>
      </div>
      <div class="messages-wrap" id="messages-wrap"></div>
      <div class="typing-indicator" id="typing-indicator"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea class="msg-input" id="msg-input" placeholder="Message..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this); sendTyping(true)"
            onblur="sendTyping(false)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── New DM Modal ─────────────────────────────────────────── -->
<div class="modal-backdrop" id="dm-modal">
  <div class="modal" onclick.stop>
    <div class="modal-title">New message</div>
    <div class="field" style="position:relative">
      <label>Search user</label>
      <input type="text" id="dm-search" placeholder="Username..." oninput="searchDMUsers(this.value)" autocomplete="off">
      <div class="search-results" id="dm-results" style="position:absolute;left:0;right:0;top:calc(100% + 4px)"></div>
    </div>
    <div id="dm-selected" style="margin-top:12px"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal('dm-modal')">Cancel</button>
      <button class="btn" onclick="openDM()" id="dm-open-btn" disabled>Open chat</button>
    </div>
  </div>
</div>

<!-- ── New Group Modal ─────────────────────────────────────── -->
<div class="modal-backdrop" id="group-modal">
  <div class="modal">
    <div class="modal-title">New group</div>
    <div class="field">
      <label>Group name</label>
      <input type="text" id="group-name" placeholder="My Group">
    </div>
    <div class="field" style="position:relative">
      <label>Add members</label>
      <input type="text" id="group-search" placeholder="Search username..." oninput="searchGroupUsers(this.value)" autocomplete="off">
      <div class="search-results" id="group-results" style="position:absolute;left:0;right:0;top:calc(100% + 4px)"></div>
    </div>
    <div class="user-chips" id="group-chips"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal('group-modal')">Cancel</button>
      <button class="btn" onclick="createGroup()">Create group</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  token: localStorage.getItem('token'),
  user: JSON.parse(localStorage.getItem('user') || 'null'),
  chats: [],
  activeChatId: null,
  messages: [],
  dmTarget: null,
  groupMembers: [],
  typingTimers: {},
  typingUsers: {},
};

let ws = null;
let typingTimeout = null;

// ─── Boot ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  if (state.token && state.user) bootApp();
};

function bootApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('my-username').textContent = state.user.username;
  setAvatar('my-avatar', state.user.username, state.user.avatar_color);
  connectWS();
  loadChats();
}

function setAvatar(elId, name, color, isGroup = false) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.style.background = color || '#6366f1';
  el.textContent = isGroup ? '◆' : (name?.[0] || '?').toUpperCase();
}

function avatarHTML(name, color, isGroup = false, sm = false) {
  return `<div class="avatar${sm ? ' sm' : ''}${isGroup ? ' group' : ''}" style="background:${color || '#6366f1'}">${isGroup ? '◆' : (name?.[0] || '?').toUpperCase()}</div>`;
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !password) { err.textContent = 'Please fill all fields'; return; }
  try {
    const r = await api('/api/login', { email, password });
    localStorage.setItem('token', r.token);
    localStorage.setItem('user', JSON.stringify(r.user));
    state.token = r.token; state.user = r.user;
    bootApp();
  } catch (e) { err.textContent = e.message; }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const err = document.getElementById('register-error');
  err.textContent = '';
  if (!username || !email || !password) { err.textContent = 'Please fill all fields'; return; }
  try {
    const r = await api('/api/register', { username, email, password });
    localStorage.setItem('token', r.token);
    localStorage.setItem('user', JSON.stringify(r.user));
    state.token = r.token; state.user = r.user;
    bootApp();
  } catch (e) { err.textContent = e.message; }
}

function logout() {
  localStorage.removeItem('token'); localStorage.removeItem('user');
  if (ws) ws.close();
  location.reload();
}

// ─── API helper ───────────────────────────────────────────────────────────────
async function api(url, body, method) {
  const opts = {
    method: body ? (method || 'POST') : 'GET',
    headers: { 'Content-Type': 'application/json', ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}) },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Something went wrong');
  return data;
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => ws.send(JSON.stringify({ type: 'auth', token: state.token }));

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'message') {
      const msg = data.message;
      // Update chat list preview
      const chat = state.chats.find(c => c.id === msg.chat_id);
      if (chat) { chat.last_message = msg.content; chat.last_message_at = msg.created_at; chat.last_sender = msg.username; renderChatList(); }
      // Append to messages if active chat
      if (state.activeChatId === msg.chat_id) {
        state.messages.push(msg);
        appendMessage(msg, true);
      }
    }
    if (data.type === 'typing') {
      const { chat_id, user_id, username, is_typing } = data;
      if (chat_id !== state.activeChatId) return;
      if (is_typing) {
        state.typingUsers[user_id] = username;
        clearTimeout(state.typingTimers[user_id]);
        state.typingTimers[user_id] = setTimeout(() => { delete state.typingUsers[user_id]; renderTyping(); }, 3000);
      } else {
        delete state.typingUsers[user_id];
        clearTimeout(state.typingTimers[user_id]);
      }
      renderTyping();
    }
  };

  ws.onclose = () => setTimeout(connectWS, 3000);
}

function sendTyping(isTyping) {
  if (!state.activeChatId || !ws || ws.readyState !== 1) return;
  if (isTyping) {
    if (typingTimeout) return; // already sent
    ws.send(JSON.stringify({ type: 'typing', chat_id: state.activeChatId, is_typing: true }));
    typingTimeout = setTimeout(() => { typingTimeout = null; }, 2000);
  } else {
    clearTimeout(typingTimeout); typingTimeout = null;
    ws.send(JSON.stringify({ type: 'typing', chat_id: state.activeChatId, is_typing: false }));
  }
}

function renderTyping() {
  const names = Object.values(state.typingUsers);
  const el = document.getElementById('typing-indicator');
  if (!el) return;
  el.textContent = names.length ? `${names.join(', ')} ${names.length === 1 ? 'is' : 'are'} typing...` : '';
}

// ─── Chats ────────────────────────────────────────────────────────────────────
async function loadChats() {
  state.chats = await api('/api/chats', null, 'GET');
  renderChatList();
}

function renderChatList() {
  const el = document.getElementById('chat-list');
  if (!state.chats.length) {
    el.innerHTML = '<div class="no-chats">No conversations yet.<br>Search for a user to start chatting.</div>';
    return;
  }
  el.innerHTML = state.chats.map(chat => {
    const isGroup = chat.is_group;
    const color = isGroup ? '#6366f1' : (chat.other_user?.avatar_color || '#6366f1');
    const name = chat.display_name || 'Unknown';
    const preview = chat.last_message ? (chat.last_sender !== state.user.username ? `${chat.last_sender}: ` : '') + chat.last_message : 'No messages yet';
    const time = chat.last_message_at ? formatTime(chat.last_message_at) : '';
    return `<div class="chat-item${state.activeChatId === chat.id ? ' active' : ''}" onclick="openChat('${chat.id}')">
      ${avatarHTML(name, color, isGroup)}
      <div class="chat-info">
        <div class="chat-name">${esc(name)}</div>
        <div class="chat-preview">${esc(preview)}</div>
      </div>
      <div class="chat-time">${time}</div>
    </div>`;
  }).join('');
}

async function openChat(chatId) {
  state.activeChatId = chatId;
  state.typingUsers = {};
  renderChatList();

  const chat = state.chats.find(c => c.id === chatId);
  const isGroup = chat.is_group;
  const name = chat.display_name;
  const color = isGroup ? '#6366f1' : (chat.other_user?.avatar_color || '#6366f1');

  document.getElementById('empty-state').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex';

  const av = document.getElementById('chat-avatar');
  av.style.background = color;
  av.textContent = isGroup ? '◆' : (name?.[0] || '?').toUpperCase();
  document.getElementById('chat-header-name').textContent = name;
  document.getElementById('chat-header-sub').textContent = isGroup
    ? `${chat.members?.length || ''} members`
    : chat.other_user?.username || '';
  document.getElementById('typing-indicator').textContent = '';

  state.messages = await api(`/api/chats/${chatId}/messages`, null, 'GET');
  renderMessages();

  document.getElementById('msg-input').focus();
}

function renderMessages() {
  const wrap = document.getElementById('messages-wrap');
  wrap.innerHTML = '';
  let lastDate = null;
  let lastSender = null;
  let groupEl = null;

  state.messages.forEach((msg, i) => {
    const date = new Date(msg.created_at * 1000).toDateString();
    if (date !== lastDate) {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = `<span>${formatDate(msg.created_at)}</span>`;
      wrap.appendChild(div);
      lastDate = date;
      lastSender = null;
    }

    const isMine = msg.sender_id === state.user.id;
    const newGroup = msg.sender_id !== lastSender;

    if (newGroup) {
      groupEl = document.createElement('div');
      groupEl.className = `msg-group ${isMine ? 'mine' : 'other'}`;
      const senderRow = document.createElement('div');
      senderRow.className = 'msg-sender-row';
      if (!isMine) {
        senderRow.innerHTML = `${avatarHTML(msg.username, msg.avatar_color, false, true)}<span class="msg-sender-name" style="color:${msg.avatar_color}">${esc(msg.username)}</span><span class="msg-sender-time">${formatTimeShort(msg.created_at)}</span>`;
      } else {
        senderRow.innerHTML = `<span class="msg-sender-time">${formatTimeShort(msg.created_at)}</span>`;
      }
      groupEl.appendChild(senderRow);
      const bubblesEl = document.createElement('div');
      bubblesEl.className = 'msg-bubble-wrap';
      groupEl.appendChild(bubblesEl);
      wrap.appendChild(groupEl);
      lastSender = msg.sender_id;
    }

    const bubblesEl = groupEl.querySelector('.msg-bubble-wrap');
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.content;
    bubblesEl.appendChild(bubble);
  });

  wrap.scrollTop = wrap.scrollHeight;
}

function appendMessage(msg, scroll = true) {
  const wrap = document.getElementById('messages-wrap');
  const isMine = msg.sender_id === state.user.id;

  // Check if we can append to the last group
  const lastGroup = wrap.querySelector('.msg-group:last-child');
  if (lastGroup && lastGroup.classList.contains(isMine ? 'mine' : 'other')) {
    const lastSenderId = isMine ? state.user.id : msg.sender_id;
    const senderMatch = isMine || lastGroup.dataset.senderId === msg.sender_id;
    if (senderMatch) {
      const bubblesEl = lastGroup.querySelector('.msg-bubble-wrap');
      if (bubblesEl) {
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = msg.content;
        bubblesEl.appendChild(bubble);
        if (scroll) wrap.scrollTop = wrap.scrollHeight;
        return;
      }
    }
  }

  // New group
  const groupEl = document.createElement('div');
  groupEl.className = `msg-group ${isMine ? 'mine' : 'other'}`;
  groupEl.dataset.senderId = msg.sender_id;
  const senderRow = document.createElement('div');
  senderRow.className = 'msg-sender-row';
  if (!isMine) {
    senderRow.innerHTML = `${avatarHTML(msg.username, msg.avatar_color, false, true)}<span class="msg-sender-name" style="color:${msg.avatar_color}">${esc(msg.username)}</span><span class="msg-sender-time">${formatTimeShort(msg.created_at)}</span>`;
  } else {
    senderRow.innerHTML = `<span class="msg-sender-time">${formatTimeShort(msg.created_at)}</span>`;
  }
  groupEl.appendChild(senderRow);
  const bubblesEl = document.createElement('div');
  bubblesEl.className = 'msg-bubble-wrap';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.content;
  bubblesEl.appendChild(bubble);
  groupEl.appendChild(bubblesEl);
  wrap.appendChild(groupEl);

  if (scroll) wrap.scrollTop = wrap.scrollHeight;
}

// ─── Send ─────────────────────────────────────────────────────────────────────
function sendMessage() {
  if (!state.activeChatId || !ws || ws.readyState !== 1) return;
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;
  ws.send(JSON.stringify({ type: 'message', chat_id: state.activeChatId, content }));
  input.value = '';
  autoResize(input);
  sendTyping(false);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ─── Search ───────────────────────────────────────────────────────────────────
let searchTimer;
async function searchUsers(q) {
  clearTimeout(searchTimer);
  if (!q.trim()) { document.getElementById('search-results').innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    const users = await api(`/api/users/search?q=${encodeURIComponent(q)}`, null, 'GET');
    const el = document.getElementById('search-results');
    el.innerHTML = users.map(u => `<div class="search-result-item" onclick="startDMFromSearch('${u.id}')">
      ${avatarHTML(u.username, u.avatar_color, false, true)}<span>${esc(u.username)}</span>
    </div>`).join('') || '<div style="padding:10px 12px;color:var(--text-3);font-size:13px">No users found</div>';
    el.classList.add('show');
  }, 250);
}

async function startDMFromSearch(userId) {
  document.getElementById('user-search').value = '';
  document.getElementById('search-results').classList.remove('show');
  const { id } = await api('/api/chats/dm', { user_id: userId });
  await loadChats();
  openChat(id);
}

// ─── DM Modal ─────────────────────────────────────────────────────────────────
function showDMModal() {
  state.dmTarget = null;
  document.getElementById('dm-search').value = '';
  document.getElementById('dm-results').innerHTML = '';
  document.getElementById('dm-selected').innerHTML = '';
  document.getElementById('dm-open-btn').disabled = true;
  document.getElementById('dm-modal').classList.add('show');
  setTimeout(() => document.getElementById('dm-search').focus(), 100);
}

async function searchDMUsers(q) {
  if (!q.trim()) { document.getElementById('dm-results').innerHTML = ''; return; }
  const users = await api(`/api/users/search?q=${encodeURIComponent(q)}`, null, 'GET');
  const el = document.getElementById('dm-results');
  el.innerHTML = users.map(u => `<div class="search-result-item" onclick="selectDMUser('${u.id}', '${u.username}', '${u.avatar_color}')">
    ${avatarHTML(u.username, u.avatar_color, false, true)}<span>${esc(u.username)}</span>
  </div>`).join('') || '<div style="padding:10px 12px;color:var(--text-3);font-size:13px">No users found</div>';
  el.classList.add('show');
}

function selectDMUser(id, username, color) {
  state.dmTarget = { id, username, color };
  document.getElementById('dm-results').classList.remove('show');
  document.getElementById('dm-search').value = '';
  document.getElementById('dm-selected').innerHTML = `<div style="display:flex;align-items:center;gap:8px;padding:8px 0">${avatarHTML(username, color, false, true)}<span style="font-size:14px;font-weight:500">${esc(username)}</span></div>`;
  document.getElementById('dm-open-btn').disabled = false;
}

async function openDM() {
  if (!state.dmTarget) return;
  closeModal('dm-modal');
  const { id } = await api('/api/chats/dm', { user_id: state.dmTarget.id });
  await loadChats();
  openChat(id);
}

// ─── Group Modal ──────────────────────────────────────────────────────────────
function showGroupModal() {
  state.groupMembers = [];
  document.getElementById('group-name').value = '';
  document.getElementById('group-search').value = '';
  document.getElementById('group-results').innerHTML = '';
  document.getElementById('group-chips').innerHTML = '';
  document.getElementById('group-modal').classList.add('show');
  setTimeout(() => document.getElementById('group-name').focus(), 100);
}

async function searchGroupUsers(q) {
  if (!q.trim()) { document.getElementById('group-results').innerHTML = ''; return; }
  const users = await api(`/api/users/search?q=${encodeURIComponent(q)}`, null, 'GET');
  const filtered = users.filter(u => !state.groupMembers.find(m => m.id === u.id));
  const el = document.getElementById('group-results');
  el.innerHTML = filtered.map(u => `<div class="search-result-item" onclick="addGroupMember('${u.id}', '${u.username}', '${u.avatar_color}')">
    ${avatarHTML(u.username, u.avatar_color, false, true)}<span>${esc(u.username)}</span>
  </div>`).join('') || '<div style="padding:10px 12px;color:var(--text-3);font-size:13px">No users found</div>';
  el.classList.add('show');
}

function addGroupMember(id, username, color) {
  if (state.groupMembers.find(m => m.id === id)) return;
  state.groupMembers.push({ id, username, color });
  document.getElementById('group-search').value = '';
  document.getElementById('group-results').classList.remove('show');
  renderGroupChips();
}

function removeGroupMember(id) {
  state.groupMembers = state.groupMembers.filter(m => m.id !== id);
  renderGroupChips();
}

function renderGroupChips() {
  document.getElementById('group-chips').innerHTML = state.groupMembers.map(m =>
    `<div class="chip">${avatarHTML(m.username, m.color, false, true)}<span>${esc(m.username)}</span><span class="chip-remove" onclick="removeGroupMember('${m.id}')">×</span></div>`
  ).join('');
}

async function createGroup() {
  const name = document.getElementById('group-name').value.trim();
  if (!name) { alert('Enter a group name'); return; }
  closeModal('group-modal');
  const { id } = await api('/api/chats/group', { name, member_ids: state.groupMembers.map(m => m.id) });
  await loadChats();
  openChat(id);
}

// ─── Modal utils ──────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); });
});

// ─── Formatting ───────────────────────────────────────────────────────────────
function formatTime(unix) {
  const d = new Date(unix * 1000);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (now - d < 7 * 86400000) return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function formatTimeShort(unix) {
  return new Date(unix * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(unix) {
  const d = new Date(unix * 1000);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return 'Today';
  if (new Date(now - 86400000).toDateString() === d.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Live username check ──────────────────────────────────────────────────────
// USERNAME_PLANS mirrors server constants — update both together when adding paid tiers
const USERNAME_PLANS = { elite: 2, pro: 3, plus: 4, free: 5 };
let usernameTimer;

function checkUsername(val) {
  const hint = document.getElementById('username-hint');
  hint.textContent = '';
  clearTimeout(usernameTimer);
  if (!val) return;

  // Invalid characters
  if (!/^[a-zA-Z0-9_]+$/.test(val)) {
    hint.style.color = '#ef4444';
    hint.textContent = 'Only letters, numbers and underscores allowed';
    return;
  }

  // Too long
  if (val.length > 32) {
    hint.style.color = '#ef4444';
    hint.textContent = 'Username too long (max 32 characters)';
    return;
  }

  // Short — reserved for paid plans, show after 2s
  if (val.length >= USERNAME_PLANS.elite && val.length < USERNAME_PLANS.free) {
    usernameTimer = setTimeout(() => {
      hint.style.color = '#f59e0b';
      hint.textContent = `Usernames under ${USERNAME_PLANS.free} characters are not available yet`;
    }, 2000);
    return;
  }

  if (val.length < USERNAME_PLANS.free) return;

  // Check availability after 600ms
  usernameTimer = setTimeout(async () => {
    try {
      hint.style.color = 'var(--text-3)';
      hint.textContent = 'Checking...';
      const data = await fetch(`/api/users/check-username?username=${encodeURIComponent(val)}`).then(r => r.json());
      if (data.available) {
        hint.style.color = '#10b981';
        hint.textContent = `@${val} is available ✓`;
      } else {
        hint.style.color = '#ef4444';
        hint.textContent = `@${val} is already taken`;
      }
    } catch { hint.textContent = ''; }
  }, 600);
}

// Enter key for auth inputs
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('reg-password').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
